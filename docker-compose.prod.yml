version: "3"

services:
  web_blue:
    container_name: web_blue
    build:
      context: ./
      dockerfile: Dockerfile.prod
    command:
      - gunicorn
      - configs.wsgi:application
      - --config=/home/app/web/gunicorn.conf.py
    expose:
      - 8000
    entrypoint:
      - sh
      - configs/docker/entrypoint.prod.sh
    volumes:
      - static:/home/app/web/static
      - media:/home/app/web/media
      - gunicorn_blue_log:/var/log/gunicorn
    env_file:
      - .env

  web_green:
    container_name: web_green
    build:
      context: ./
      dockerfile: Dockerfile.prod
    command:
      - gunicorn
      - configs.wsgi:application
      - --config=/home/app/web/gunicorn.conf.py
    expose:
      - 8000
    entrypoint:
      - sh
      - configs/docker/entrypoint.prod.sh
    volumes:
      - static:/home/app/web/static
      - media:/home/app/web/media
      - gunicorn_green_log:/var/log/gunicorn
    env_file:
      - .env

  nginx:
    container_name: nginx
    depends_on:
      - web_blue
    build: ./configs/nginx
    ports:
      - "80:80"
    volumes:
      - static:/home/app/web/static
      - media:/home/app/web/media
      - nginx_log:/var/log/nginx
    environment:
      TZ: "Asia/Seoul"

volumes:
  static:
  media:
  gunicorn_blue_log:
  gunicorn_green_log:
  nginx_log:
